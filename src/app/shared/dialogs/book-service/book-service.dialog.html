<mat-dialog-content>
    <div class="flex w-full h-full">
        <div class="flex-1 bg-green-900/40 rounded-2xl p-4">
            <h2 class="mt-2 text-lg font-semibold text-white">Servicio Seleccionado</h2>
            <p class="mt-5 text-xl text-white font-medium">Masaje Reductivo</p>

        </div>

        <div class="flex flex-1 flex-col">
            <h3 class="mt-2 text-lg font-semibold text-gray-700">Seleccione la fecha</h3>
            <div class="flex">
                @for (date of dates(); track $index) {
                    <button
                        class="flex-1 h-10 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"                    
                    >
                        {{ date | formatDate }}
                    </button>
                }
            </div>
        </div>
    </div>
</mat-dialog-content>
